{% extends "base.html" %}

{% block content %}
  <div class="jumbotron border-bottom border-warning-subtle">
    <div class="container">
      <h1>
        {% trans %}Quests{% endtrans %}
      </h1>
      <p class="text-warning-emphasis mb-0">Seek each riddle, claim each relic, and carve your place on the board.</p>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-12">
        {% include "components/errors.html" %}
      </div>
    </div>

    <div 
      x-data="ChallengeBoard" 
      @load-challenges.window="loadChallenges()" 
      @load-challenge.window="loadChallenge($event.detail)"
    >
      <div
          x-ref="challengeWindow" id="challenge-window" class="modal fade" tabindex="-1" role="dialog" x-data=""
          x-html="$store.challenge.data.view"
      ></div>

      <div x-show="!loaded">
        <div class="min-vh-50 d-flex align-items-center">
          <div class="text-center w-100">
            <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
          </div>
        </div>
      </div>

      <div x-show="loaded">
        <template x-for="(category, idx) in getCategories()" :key="idx">
          <div class="pt-5">
            <div class="category-header mb-3">
              <h3 x-text="category"></h3>
            </div>

            <div class="category-challenges d-flex flex-column">
              <div class="challenges-row row">
                <template x-for="(c, idx) in getChallenges(category)" :key="c.id">
                  <div class="col-12 my-2">
                    <button
                        class="challenge-button btn w-100 text-start border border-warning-subtle bg-dark-subtle py-3"
                        :class="[
                          c.solved_by_me ? 'challenge-solved' : '',
                          ...c.tags.map((tag) => `tag-${tag.value.replace(/ /g, '-')}`),
                        ];"
                        :value="c.id" @click="loadChallenge(c.id)"
                    >

                      <div class="challenge-inner d-flex justify-content-between align-items-center">
                        <div>
                          <p class="mb-1 fw-semibold" x-text="c.name"></p>
                          <small class="text-secondary">Open quest details and submit your flag in the chamber.</small>
                        </div>
                        <span class="badge bg-warning text-dark" x-text="`${c.value} GP`"></span>
                      </div>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/challenges.js") }}
{% endblock %}
