<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth Mockup</title>
  <style>
    body { margin: 0; background: #0d0805; color: #ebdbb8; font-family: "Crimson Pro", serif; }
    .wrap { max-width: 520px; margin: 60px auto; border: 1px solid #5a3e26; background: #1a120a; padding: 24px; }
    h1 { font-family: "Cormorant Garamond", serif; font-style: italic; margin-top: 0; }
    label { display: block; margin: 12px 0 6px; color: #e8c860; }
    input { width: 100%; padding: 10px; border: 1px solid #5a3e26; background: #2e2218; color: #ebdbb8; }
    button { margin-top: 16px; width: 100%; padding: 10px; border: 1px solid #5a3e26; background: #e0a168; color: #0d0805; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Login</h1>
    <label>Username</label>
    <input />
    <label>Password</label>
    <input type="password" />
    <button>Enter the Hall</button>
  </div>
</body>
</html>
