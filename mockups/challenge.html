<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Challenge Modal Mockup</title>
  <style>
    body { margin: 0; background: #0d0805; color: #ebdbb8; font-family: "Crimson Pro", serif; }
    .modal { max-width: 760px; margin: 40px auto; border: 1px solid #5a3e26; background: #1a120a; padding: 20px; }
    h1, h2 { font-family: "Cormorant Garamond", serif; font-style: italic; }
    hr { border: none; border-top: 1px solid #5a3e26; margin: 16px 0; }
    .submit { display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #5a3e26; background: #2e2218; color: #ebdbb8; }
    button { padding: 10px 14px; border: 1px solid #5a3e26; background: #e0a168; color: #0d0805; font-weight: 700; }
  </style>
</head>
<body>
  <div class="modal">
    <h1>The Arcane Protocol</h1>
    <p>300 GP · Programming</p>
    <hr />
    <p>Challenge description and connection details appear here.</p>
    <hr />
    <h2>Hints</h2>
    <p>Hint sections are progressive and inline.</p>
    <hr />
    <div class="submit">
      <input placeholder="Speak the password" />
      <button>Strike</button>
    </div>
  </div>
</body>
</html>
