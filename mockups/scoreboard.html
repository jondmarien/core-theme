<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scoreboard Mockup</title>
  <style>
    body { margin: 0; background: #0d0805; color: #ebdbb8; font-family: "Crimson Pro", serif; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-family: "Cormorant Garamond", serif; font-style: italic; }
    table { width: 100%; border-collapse: collapse; border: 1px solid #5a3e26; }
    th, td { padding: 12px; border-bottom: 1px solid #5a3e26; text-align: left; }
    .score { color: #e8c860; font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Scoreboard</h1>
    <table>
      <thead><tr><th>Place</th><th>Adventurer</th><th>Score</th></tr></thead>
      <tbody>
        <tr><td>1</td><td>guildmaster</td><td class="score">1200 GP</td></tr>
        <tr><td>2</td><td>runebreaker</td><td class="score">980 GP</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
